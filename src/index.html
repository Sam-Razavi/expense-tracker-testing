<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <h1>Expense Tracker</h1>

        <section>
            <h2>Add Expense</h2>

            <label for="expenseTitle">Title</label>
            <input type="text" id="expenseTitle" placeholder="e.g. Coffee">

            <label for="expenseAmount">Amount</label>
            <input type="number" id="expenseAmount" placeholder="e.g. 45" min="0" step="0.01">

            <label for="expenseCategory">Category</label>
            <select id="expenseCategory">
                <option value="">Select category</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Shopping">Shopping</option>
                <option value="Bills">Bills</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Other">Other</option>
            </select>

            <label for="expenseDate">Date</label>
            <input type="date" id="expenseDate">

            <button id="addBtn">Add Expense</button>
        </section>

        <section>
            <h2>Expenses</h2>
            <ul id="expenseList"></ul>
        </section>

        <section>
            <h2>Summary</h2>
            <p id="totalAmount">Total: 0</p>

            <h3>By Category</h3>
            <ul id="categorySummary"></ul>

            <h3>By Date</h3>
            <ul id="dateSummary"></ul>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
